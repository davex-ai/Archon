<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoQuiz — Interview Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/x-icon" href="/image.png">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">

  <header>
    <div class="logo-mark">⌥</div>
    <div class="logo-text">Repo<span>Quiz</span></div>
    <div class="tag">v1.0 · interview gen</div>
  </header>

  <div class="hero">
    <h1>Turn any repo into<br><span class="hl">interview questions</span></h1>
    <p>Paste a GitHub repository URL and generate targeted technical questions to prep for or conduct code-based interviews.</p>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="field-group">
        <label>Repository URL</label>
        <input type="url" id="repoUrl" placeholder="https://github.com/user/repo" />
      </div>
      <div class="field-group">
        <label>Questions</label>
        <input type="number" id="numQuestions" value="5" min="1" max="20" />
      </div>
    </div>
    <button class="btn" id="generateBtn" onclick="generate()">
      <span class="spinner"></span>
      <span class="btn-label">✦ &nbsp;Generate Questions</span>
    </button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Analyzing repository…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="results-header" id="resultsHeader">
    <div class="results-title">Questions</div>
    <div class="results-meta" id="resultsMeta"></div>
  </div>

  <div class="questions-list" id="questionsList"></div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">◈</div>
    <p>Enter a repo URL above and hit generate.<br>Questions will appear here.</p>
  </div>

</div>

<script src="index.js" defer></script>
</body>
</html>
